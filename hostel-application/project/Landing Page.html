<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahil Bay Hostel — Discover Algeria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #ff385c; --red-dark: #e00b41;
      --near-black: #222222; --gray-sec: #6a6a6a;
      --gray-light: #f2f2f2; --border: #e0e0e0;
      --shadow-card: rgba(0,0,0,0.02) 0px 0px 0px 1px, rgba(0,0,0,0.04) 0px 2px 6px, rgba(0,0,0,0.1) 0px 4px 8px;
      --shadow-hover: rgba(0,0,0,0.08) 0px 4px 12px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Plus Jakarta Sans', -apple-system, Helvetica Neue, sans-serif; background: #fff; color: #222; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 99px; }
    input[type=date]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }

    /* Tweaks panel */
    #tweaks-panel { display:none; position:fixed; bottom:24px; right:24px; background:#fff; border-radius:16px; box-shadow:var(--shadow-card); padding:20px; width:240px; z-index:9999; font-size:13px; }
    #tweaks-panel.open { display:block; }
    #tweaks-panel h4 { font-size:14px; font-weight:700; margin-bottom:16px; }
    #tweaks-panel label { display:block; font-size:12px; font-weight:600; color:#6a6a6a; margin-bottom:4px; margin-top:12px; }
    #tweaks-panel input[type=color] { width:100%; height:32px; border-radius:8px; border:1px solid #e0e0e0; cursor:pointer; }
    #tweaks-panel select { width:100%; padding:6px 8px; border-radius:8px; border:1px solid #e0e0e0; font-size:12px; font-family:inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<div id="tweaks-panel">
  <h4>Tweaks</h4>
  <label>Accent Color</label>
  <input type="color" id="tw-accent" value="#ff385c" />
  <label>Hero Layout</label>
  <select id="tw-hero">
    <option value="split">Split</option>
    <option value="fullbleed">Full-bleed</option>
    <option value="minimal">Minimal</option>
  </select>
  <label>Card Style</label>
  <select id="tw-card">
    <option value="photo">Photo Grid</option>
    <option value="list">Compact List</option>
  </select>
</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#ff385c",
  "heroStyle": "split",
  "cardStyle": "photo"
}/*EDITMODE-END*/;

// ── Data ─────────────────────────────────────────────────────────────────────
const HOSTELS = [
  { id:1, name:"Casbah Heritage House", city:"Algiers", wilaya:"Alger", rating:4.92, reviews:218, price:4800, badge:"Guest Favourite", type:"Medina", gradient:"linear-gradient(135deg,#c79081,#dfa579)", tag:"🕌", amenities:["WiFi","Breakfast","Rooftop","A/C"], desc:"Nestled in the heart of the UNESCO-listed Casbah, this beautifully restored Ottoman house offers an authentic Algerian experience." },
  { id:2, name:"Tamanrasset Desert Lodge", city:"Tamanrasset", wilaya:"Tamanrasset", rating:4.87, reviews:143, price:6500, badge:"Popular", type:"Saharan", gradient:"linear-gradient(135deg,#f7971e,#ffd200)", tag:"🏜️", amenities:["WiFi","Camel Tours","Desert Camp","Meals"], desc:"A rustic lodge at the gateway to the Sahara, offering guided desert excursions and stunning Hoggar mountain views." },
  { id:3, name:"Oran Méditerranée Stay", city:"Oran", wilaya:"Oran", rating:4.78, reviews:312, price:5200, badge:null, type:"Coastal", gradient:"linear-gradient(135deg,#2980b9,#6dd5fa)", tag:"🌊", amenities:["WiFi","Sea View","Pool","Bar"], desc:"Modern coastal hostel overlooking the Mediterranean, minutes from the iconic Santa Cruz fortress and vibrant port city life." },
  { id:4, name:"Constantine Viaduct View", city:"Constantine", wilaya:"Constantine", rating:4.95, reviews:87, price:4200, badge:"Top Rated", type:"Historical", gradient:"linear-gradient(135deg,#654ea3,#eaafc8)", tag:"🌉", amenities:["WiFi","Breakfast","City Tours","Terrace"], desc:"Perched above the dramatic ravines of Constantine, the city of bridges. Wake up to breathtaking gorge and suspension bridge views." },
  { id:5, name:"Tlemcen Atlas Retreat", city:"Tlemcen", wilaya:"Tlemcen", rating:4.81, reviews:196, price:3800, badge:null, type:"Atlas", gradient:"linear-gradient(135deg,#56ab2f,#a8e063)", tag:"⛰️", amenities:["WiFi","Garden","Hiking","Meals"], desc:"A serene mountain retreat in the Tell Atlas foothills, surrounded by cedar forests and ancient Zianid ruins." },
  { id:6, name:"Annaba Corniche Hostel", city:"Annaba", wilaya:"Annaba", rating:4.74, reviews:264, price:4600, badge:null, type:"Coastal", gradient:"linear-gradient(135deg,#1d976c,#93f9b9)", tag:"🌴", amenities:["WiFi","Beach Access","Terrace","A/C"], desc:"Relaxed coastal hostel on the Annaba corniche, close to the Hippo Regius Roman ruins and beautiful Seraïdi forest." },
  { id:7, name:"Ghardaïa Mozabite Inn", city:"Ghardaïa", wilaya:"Ghardaïa", rating:4.89, reviews:101, price:5500, badge:"Unique Stay", type:"Saharan", gradient:"linear-gradient(135deg,#f2994a,#f2c94c)", tag:"🏺", amenities:["WiFi","Guided Tours","Local Cuisine","Courtyard"], desc:"Stay in a traditional Mozabite-style guesthouse in the M'Zab Valley, a UNESCO World Heritage Site of extraordinary beauty." },
  { id:8, name:"Béjaïa Kabyle House", city:"Béjaïa", wilaya:"Béjaïa", rating:4.96, reviews:54, price:4400, badge:"New", type:"Coastal", gradient:"linear-gradient(135deg,#43cea2,#185a9d)", tag:"🏔️", amenities:["WiFi","Mountain View","Sea View","Terrace"], desc:"Where the Kabyle mountains meet the Mediterranean. This charming guesthouse offers the best of both worlds in Béjaïa." },
];

const CATEGORIES = [
  { id:"all", label:"All Stays", icon:"🇩🇿" },
  { id:"Coastal", label:"Coastal", icon:"🌊" },
  { id:"Saharan", label:"Saharan", icon:"🏜️" },
  { id:"Medina", label:"Medina", icon:"🕌" },
  { id:"Atlas", label:"Atlas", icon:"⛰️" },
  { id:"Historical", label:"Historical", icon:"🏛️" },
  { id:"Urban", label:"Urban", icon:"🌆" },
];

const CITIES = ["Algiers","Oran","Constantine","Annaba","Tlemcen","Ghardaïa","Tamanrasset","Béjaïa","Tipaza","Skikda","Sétif","Batna","Biskra","Tizi Ouzou"];

const NAV_MENU = {
  explore: [
    { label:"Browse All Hostels", href:"#" },
    { label:"Coastal Stays", href:"#" },
    { label:"Saharan Experiences", href:"#" },
    { label:"Historic Medinas", href:"#" },
    { label:"Atlas Mountains", href:"#" },
  ],
  company: [
    { label:"About Sahil Bay", href:"#" },
    { label:"Our Story", href:"#" },
    { label:"Blog & Travel Guides", href:"#" },
    { label:"Careers", href:"#" },
    { label:"Press", href:"#" },
  ],
  help: [
    { label:"Help Center", href:"#" },
    { label:"Safety Information", href:"#" },
    { label:"Cancellation Policy", href:"#" },
    { label:"Contact Us", href:"#" },
  ],
};

// ── Components ────────────────────────────────────────────────────────────────

function Logo({ accent, size = "md" }) {
  const s = size === "sm" ? 26 : 32;
  const fs = size === "sm" ? 17 : 20;
  return (
    <a href="Landing Page.html" style={{ display:"flex", alignItems:"center", gap:8, textDecoration:"none" }}>
      <svg width={s} height={s} viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill={accent}/>
        <path d="M20 8C14 8 10 13 10 18C10 24 16 30 20 33C24 30 30 24 30 18C30 13 26 8 20 8Z" fill="white" opacity="0.9"/>
        <circle cx="20" cy="18" r="4" fill={accent}/>
      </svg>
      <span style={{ fontSize:fs, fontWeight:800, color:accent, letterSpacing:"-0.5px", lineHeight:1 }}>Sahil Bay</span>
    </a>
  );
}

function HeartBtn() {
  const [liked, setLiked] = useState(false);
  return (
    <button onClick={e=>{e.stopPropagation();setLiked(l=>!l)}} style={{ position:"absolute",top:12,right:12,background:"rgba(0,0,0,0.2)",backdropFilter:"blur(4px)",border:"none",cursor:"pointer",padding:6,borderRadius:"50%",zIndex:2,display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s" }}
      onMouseEnter={e=>e.currentTarget.style.background="rgba(0,0,0,0.35)"}
      onMouseLeave={e=>e.currentTarget.style.background="rgba(0,0,0,0.2)"}>
      <svg width="18" height="18" viewBox="0 0 24 24" fill={liked?"#ff385c":"none"} stroke={liked?"#ff385c":"white"} strokeWidth="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
  );
}

function HostelCard({ hostel, accent, style: extraStyle }) {
  const [hov, setHov] = useState(false);
  return (
    <a href={`Hostel Detail.html?id=${hostel.id}`} style={{ textDecoration:"none", color:"inherit", display:"block", borderRadius:20, overflow:"visible", cursor:"pointer", transform:hov?"translateY(-4px)":"translateY(0)", transition:"transform 0.2s ease", ...extraStyle }}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}>
      {/* Image */}
      <div style={{ position:"relative", width:"100%", paddingBottom:"66%", background:hostel.gradient, borderRadius:16, overflow:"hidden" }}>
        <div style={{ position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:52,opacity:0.3 }}>{hostel.tag}</div>
        <div style={{ position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(45deg,rgba(255,255,255,0.04) 0px,rgba(255,255,255,0.04) 1px,transparent 1px,transparent 8px)" }}/>
        <div style={{ position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",fontSize:9,color:"rgba(255,255,255,0.4)",fontFamily:"monospace",whiteSpace:"nowrap" }}>hostel photo</div>
        <HeartBtn />
        {hostel.badge && (
          <div style={{ position:"absolute",top:12,left:12,background:"#fff",borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:700,color:hostel.badge==="Guest Favourite"?"#222":accent,boxShadow:"0 2px 8px rgba(0,0,0,0.12)" }}>{hostel.badge}</div>
        )}
      </div>
      {/* Info */}
      <div style={{ padding:"12px 2px 8px" }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8 }}>
          <div style={{ fontWeight:600,fontSize:15,color:"#222",lineHeight:1.3,letterSpacing:"-0.2px" }}>{hostel.name}</div>
          <div style={{ display:"flex",alignItems:"center",gap:3,flexShrink:0 }}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="#222"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span style={{ fontSize:13,fontWeight:600,color:"#222" }}>{hostel.rating}</span>
          </div>
        </div>
        <div style={{ fontSize:13,color:"#6a6a6a",marginTop:3 }}>{hostel.city}, Algeria</div>
        <div style={{ fontSize:13,color:"#6a6a6a",marginTop:1 }}>{hostel.reviews} reviews</div>
        <div style={{ marginTop:8,fontSize:15 }}>
          <span style={{ fontWeight:700,color:"#222" }}>{hostel.price.toLocaleString()} DA</span>
          <span style={{ color:"#6a6a6a",fontWeight:400,fontSize:13 }}> / night</span>
        </div>
      </div>
    </a>
  );
}

function SearchBar({ compact, accent }) {
  const [location, setLocation] = useState("");
  const [checkIn, setCheckIn] = useState("");
  const [checkOut, setCheckOut] = useState("");
  const [guests, setGuests] = useState(1);
  const [minPrice, setMinPrice] = useState("");
  const [maxPrice, setMaxPrice] = useState("");
  const [showSug, setShowSug] = useState(false);
  const [focused, setFocused] = useState(null);

  const filtered = CITIES.filter(c => location && c.toLowerCase().includes(location.toLowerCase()));

  const inputStyle = (name) => ({
    border:"none",outline:"none",background:"transparent",fontFamily:"inherit",
    fontSize:compact?13:14,color:"#222",width:"100%",padding:0,
    borderBottom:focused===name?`2px solid ${accent}`:"2px solid transparent",
    paddingBottom:2,transition:"border-color 0.2s",
  });
  const sec = { padding:compact?"10px 16px":"16px 20px", borderRight:"1px solid #e0e0e0", flex:1, minWidth:0, position:"relative", cursor:"text" };

  const handleSearch = () => {
    const params = new URLSearchParams();
    if (location) params.set("city", location);
    if (checkIn) params.set("checkIn", checkIn);
    if (checkOut) params.set("checkOut", checkOut);
    params.set("guests", guests);
    window.location.href = `Hostel Detail.html?${params.toString()}`;
  };

  return (
    <div style={{ display:"flex",alignItems:"stretch",background:"#fff",borderRadius:32,border:"1px solid #e0e0e0",boxShadow:"rgba(0,0,0,0.02) 0px 0px 0px 1px,rgba(0,0,0,0.04) 0px 2px 6px,rgba(0,0,0,0.1) 0px 4px 8px",overflow:"visible" }}>
      {/* Location */}
      <div style={{...sec,flex:1.5}} onClick={()=>setFocused("loc")}>
        <div style={{fontSize:11,fontWeight:700,marginBottom:4,letterSpacing:0.3,color:"#222"}}>WHERE</div>
        <input value={location} onChange={e=>{setLocation(e.target.value);setShowSug(true)}}
          onFocus={()=>{setFocused("loc");setShowSug(true)}}
          onBlur={()=>setTimeout(()=>setShowSug(false),150)}
          placeholder="Search cities in Algeria" style={inputStyle("loc")}/>
        {showSug && filtered.length > 0 && (
          <div style={{ position:"absolute",top:"100%",left:0,right:0,background:"#fff",borderRadius:16,boxShadow:"rgba(0,0,0,0.12) 0px 8px 24px",zIndex:200,marginTop:8,overflow:"hidden" }}>
            {filtered.map(c=>(
              <div key={c} onClick={()=>{setLocation(c);setShowSug(false)}}
                style={{padding:"10px 20px",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",gap:10,transition:"background 0.1s"}}
                onMouseEnter={e=>e.currentTarget.style.background="#f7f7f7"}
                onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                <span style={{fontSize:16}}>📍</span>{c}, Algeria
              </div>
            ))}
          </div>
        )}
      </div>
      {/* Check-in */}
      <div style={sec} onClick={()=>setFocused("in")}>
        <div style={{fontSize:11,fontWeight:700,marginBottom:4,letterSpacing:0.3,color:"#222"}}>CHECK-IN</div>
        <input type="date" value={checkIn} onChange={e=>setCheckIn(e.target.value)}
          onFocus={()=>setFocused("in")} onBlur={()=>setFocused(null)}
          style={{...inputStyle("in"),colorScheme:"light"}}/>
      </div>
      {/* Check-out */}
      <div style={sec} onClick={()=>setFocused("out")}>
        <div style={{fontSize:11,fontWeight:700,marginBottom:4,letterSpacing:0.3,color:"#222"}}>CHECK-OUT</div>
        <input type="date" value={checkOut} onChange={e=>setCheckOut(e.target.value)}
          onFocus={()=>setFocused("out")} onBlur={()=>setFocused(null)}
          style={{...inputStyle("out"),colorScheme:"light"}}/>
      </div>
      {/* Guests */}
      <div style={sec}>
        <div style={{fontSize:11,fontWeight:700,marginBottom:4,letterSpacing:0.3,color:"#222"}}>GUESTS</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={e=>{e.stopPropagation();setGuests(g=>Math.max(1,g-1))}} style={{width:24,height:24,borderRadius:"50%",border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:"#222"}}>−</button>
          <span style={{fontSize:14,fontWeight:600,minWidth:16,textAlign:"center"}}>{guests}</span>
          <button onClick={e=>{e.stopPropagation();setGuests(g=>g+1)}} style={{width:24,height:24,borderRadius:"50%",border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",color:"#222"}}>+</button>
        </div>
      </div>
      {/* Price */}
      {!compact && (
        <div style={sec}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:4,letterSpacing:0.3,color:"#222"}}>PRICE / NIGHT (DA)</div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <input value={minPrice} onChange={e=>setMinPrice(e.target.value)} placeholder="Min"
              style={{...inputStyle("price"),width:48}} onFocus={()=>setFocused("price")} onBlur={()=>setFocused(null)}/>
            <span style={{color:"#ccc"}}>—</span>
            <input value={maxPrice} onChange={e=>setMaxPrice(e.target.value)} placeholder="Max"
              style={{...inputStyle("price"),width:48}} onFocus={()=>setFocused("price")} onBlur={()=>setFocused(null)}/>
          </div>
        </div>
      )}
      {/* Search */}
      <div style={{padding:"8px",display:"flex",alignItems:"center",flexShrink:0}}>
        <button onClick={handleSearch} style={{ background:accent,border:"none",borderRadius:24,cursor:"pointer",display:"flex",alignItems:"center",gap:8,padding:compact?"12px 20px":"14px 24px",color:"#fff",fontFamily:"inherit",fontWeight:700,fontSize:14,transition:"background 0.2s,transform 0.15s" }}
          onMouseEnter={e=>{e.currentTarget.style.background="#e00b41";e.currentTarget.style.transform="scale(1.04)"}}
          onMouseLeave={e=>{e.currentTarget.style.background=accent;e.currentTarget.style.transform="scale(1)"}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          {!compact && <span>Search</span>}
        </button>
      </div>
    </div>
  );
}

function CategoryPills({ active, setActive }) {
  const ref = useRef(null);
  const scroll = (d) => ref.current?.scrollBy({left:d*200,behavior:"smooth"});
  const circleBtn = (dir, onClick) => (
    <button onClick={onClick} style={{width:32,height:32,borderRadius:"50%",background:"#f2f2f2",border:"1px solid #e0e0e0",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"box-shadow 0.2s"}}
      onMouseEnter={e=>e.currentTarget.style.boxShadow="rgba(0,0,0,0.08) 0px 4px 12px"}
      onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#222" strokeWidth="2.5"><path d={dir==="left"?"M15 18l-6-6 6-6":"M9 18l6-6-6-6"}/></svg>
    </button>
  );
  return (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      {circleBtn("left",()=>scroll(-1))}
      <div ref={ref} style={{display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none",flex:1}}>
        {CATEGORIES.map(cat=>(
          <button key={cat.id} onClick={()=>setActive(cat.id)} style={{
            display:"flex",flexDirection:"column",alignItems:"center",gap:4,
            padding:"10px 18px",borderRadius:8,border:"none",background:"transparent",
            cursor:"pointer",flexShrink:0,fontFamily:"inherit",
            borderBottom:active===cat.id?"2px solid #222":"2px solid transparent",
            opacity:active===cat.id?1:0.55,transition:"opacity 0.15s,border-color 0.15s",
          }}
            onMouseEnter={e=>e.currentTarget.style.opacity="1"}
            onMouseLeave={e=>e.currentTarget.style.opacity=active===cat.id?"1":"0.55"}>
            <span style={{fontSize:22}}>{cat.icon}</span>
            <span style={{fontSize:12,fontWeight:600,color:"#222",whiteSpace:"nowrap"}}>{cat.label}</span>
          </button>
        ))}
      </div>
      {circleBtn("right",()=>scroll(1))}
    </div>
  );
}

// ── Navigation Dropdown ───────────────────────────────────────────────────────
function NavDropdown({ accent }) {
  const [open, setOpen] = useState(false);
  const [tab, setTab] = useState("explore");
  const ref = useRef(null);

  useEffect(()=>{
    const h = (e) => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return ()=>document.removeEventListener("mousedown",h);
  },[]);

  const items = NAV_MENU[tab] || [];

  return (
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        display:"flex",alignItems:"center",gap:8,border:"1px solid #e0e0e0",borderRadius:32,padding:"8px 12px",cursor:"pointer",background:"#fff",transition:"box-shadow 0.2s",fontFamily:"inherit"
      }}
        onMouseEnter={e=>e.currentTarget.style.boxShadow="rgba(0,0,0,0.08) 0px 4px 12px"}
        onMouseLeave={e=>!open&&(e.currentTarget.style.boxShadow="none")}
      >
        {/* Hamburger */}
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#222" strokeWidth="2" strokeLinecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        {/* Avatar */}
        <div style={{width:28,height:28,borderRadius:"50%",background:"#6a6a6a",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </button>

      {open && (
        <div style={{
          position:"absolute",top:"calc(100% + 12px)",right:0,width:320,

    </div>
  );
}

function App() {

  const [heroStyle, setHeroStyle] = useState(TWEAK_DEFAULTS.heroStyle);
  const [cardStyle, setCardStyle] = useState(TWEAK_DEFAULTS.cardStyle);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(()=>{
    const onScroll=()=>setScrolled(window.scrollY>60);
    window.addEventListener("scroll",onScroll);
    return ()=>window.removeEventListener("scroll",onScroll);
  },[]);

  useEffect(()=>{
    const h=(e)=>{
      if(e.data?.type==="__activate_edit_mode") setTweaksOpen(true);
      if(e.data?.type==="__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message",h);
    window.parent.postMessage({type:"__edit_mode_available"},"*");
    return ()=>window.removeEventListener("message",h);
  },[]);

  useEffect(()=>{
    const panel=document.getElementById("tweaks-panel");
    if(tweaksOpen){
      panel.classList.add("open");
      const ac=document.getElementById("tw-accent");
      const he=document.getElementById("tw-hero");
      const ca=document.getElementById("tw-card");
      if(ac) ac.oninput=(e)=>{setAccent(e.target.value);window.parent.postMessage({type:"__edit_mode_set_keys",edits:{accentColor:e.target.value}},"*");};
      if(he) he.onchange=(e)=>{setHeroStyle(e.target.value);window.parent.postMessage({type:"__edit_mode_set_keys",edits:{heroStyle:e.target.value}},"*");};
      if(ca) ca.onchange=(e)=>{setCardStyle(e.target.value);window.parent.postMessage({type:"__edit_mode_set_keys",edits:{cardStyle:e.target.value}},"*");};

                    onMouseEnter={e=>e.currentTarget.style.color="#222"}
                    onMouseLeave={e=>e.currentTarget.style.color="#6a6a6a"}>{l}</div>
                ))}
              </div>
            ))}
          </div>
          <div style={{borderTop:"1px solid #f0f0f0",paddingTop:24,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <div style={{fontSize:13,color:"#6a6a6a"}}>© 2026 Sahil Bay Hostel · <span style={{cursor:"pointer"}}>Privacy</span> · <span style={{cursor:"pointer"}}>Terms</span> · <span style={{cursor:"pointer"}}>Sitemap</span></div>
            <div style={{display:"flex",gap:12}}>
              {["🌐 English","🌐 العربية","DA Dinar"].map(l=>(
                <button key={l} style={{background:"transparent",border:"1px solid #e0e0e0",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,color:"#222",cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
