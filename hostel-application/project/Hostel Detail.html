              <div key={i} onClick={e=>{e.stopPropagation();setActiveImg(i)}} style={{width:i===activeImg?28:8,height:8,borderRadius:4,background:i===activeImg?"#fff":"rgba(255,255,255,0.35)",cursor:"pointer",transition:"width 0.2s"}}/>

      )}
    </>
  );
}

// ── Booking Panel ─────────────────────────────────────────────────────────────
function BookingPanel({ hostel }) {
  const [selectedRoom, setSelectedRoom] = useState(null);
  const [checkIn, setCheckIn] = useState(getParam("checkIn") || "");
  const [checkOut, setCheckOut] = useState(getParam("checkOut") || "");
  const [guests, setGuests] = useState(parseInt(getParam("guests") || "1"));
  const [step, setStep] = useState(1);
  const [liked, setLiked] = useState(false);

  const today = new Date().toISOString().split("T")[0];
  const nights = (checkIn && checkOut) ? Math.max(0, Math.round((new Date(checkOut)-new Date(checkIn))/(86400000))) : 0;
  const room = hostel.rooms.find(r => r.id === selectedRoom);
  const subtotal = room && nights > 0 ? room.price * nights : 0;
  const serviceFee = Math.round(subtotal * 0.08);
  const total = subtotal + serviceFee;

  const iBase = {width:"100%",border:"1px solid #e0e0e0",borderRadius:10,padding:"11px 14px",fontSize:14,fontFamily:"inherit",color:"#222",outline:"none",background:"#fff"};
  const focusRed = e => { e.target.style.borderColor = ACCENT; };
  const blurGray = e => { e.target.style.borderColor = "#e0e0e0"; };

  if (step === 3) return (
    <div style={{border:"1px solid #e0e0e0",borderRadius:24,padding:28,boxShadow:"rgba(0,0,0,0.02) 0px 0px 0px 1px,rgba(0,0,0,0.06) 0px 4px 12px",textAlign:"center"}}>
      <div style={{width:60,height:60,borderRadius:"50%",background:"#f0fff4",border:"2px solid #22c55e",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h3 style={{fontSize:20,fontWeight:700,color:"#222",marginBottom:8}}>Booking Requested!</h3>
      <p style={{fontSize:14,color:"#6a6a6a",lineHeight:1.6,marginBottom:20}}>Your request for <strong>{room?.name}</strong> has been sent. The host will confirm within 2 hours.</p>
      <div style={{background:"#f7f7f7",borderRadius:12,padding:16,textAlign:"left",marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}><span style={{color:"#6a6a6a"}}>Check-in</span><span style={{fontWeight:600}}>{checkIn}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}><span style={{color:"#6a6a6a"}}>Check-out</span><span style={{fontWeight:600}}>{checkOut}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}><span style={{color:"#6a6a6a"}}>Guests</span><span style={{fontWeight:600}}>{guests}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700,borderTop:"1px solid #e0e0e0",paddingTop:10,marginTop:6}}><span>Total</span><span style={{color:ACCENT}}>{total.toLocaleString()} DA</span></div>
      </div>
      <button onClick={()=>{setStep(1);setSelectedRoom(null);}} style={{width:"100%",background:"#f2f2f2",color:"#222",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Make another booking</button>
    </div>
  );

  if (step === 2 && room) return (
    <div style={{border:"1px solid #e0e0e0",borderRadius:24,padding:28,boxShadow:"rgba(0,0,0,0.02) 0px 0px 0px 1px,rgba(0,0,0,0.06) 0px 4px 12px"}}>
      <button onClick={()=>setStep(1)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",fontSize:14,fontWeight:600,color:"#6a6a6a",marginBottom:16,fontFamily:"inherit"}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>Back
      </button>
      <h3 style={{fontSize:18,fontWeight:700,color:"#222",marginBottom:20}}>Review your booking</h3>
      <div style={{background:"#f7f7f7",borderRadius:12,padding:14,marginBottom:20,display:"flex",gap:12,alignItems:"center"}}>
        <div style={{width:52,height:52,borderRadius:10,background:hostel.gradients[0],flexShrink:0}}/>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:"#222"}}>{room.name}</div>
          <div style={{fontSize:13,color:"#6a6a6a"}}>{hostel.name} · {hostel.city}</div>
        </div>
      </div>
      <div style={{marginBottom:20}}>
        {[
          [`${room.price.toLocaleString()} DA × ${nights} night${nights!==1?"s":""}`, `${subtotal.toLocaleString()} DA`],
          ["Service fee (8%)", `${serviceFee.toLocaleString()} DA`],
        ].map(([l,r],i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:8,color:"#222"}}><span>{l}</span><span>{r}</span></div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:700,borderTop:"1px solid #e0e0e0",paddingTop:12,marginTop:4}}>
          <span>Total</span><span style={{color:ACCENT}}>{total.toLocaleString()} DA</span>
        </div>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:"#222",marginBottom:10}}>Guest details</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <input placeholder="First name" style={iBase} onFocus={focusRed} onBlur={blurGray}/>
          <input placeholder="Last name" style={iBase} onFocus={focusRed} onBlur={blurGray}/>
        </div>
        <input placeholder="Email address" type="email" style={{...iBase,marginBottom:10}} onFocus={focusRed} onBlur={blurGray}/>
        <input placeholder="Phone number" type="tel" style={iBase} onFocus={focusRed} onBlur={blurGray}/>
      </div>
      <p style={{fontSize:12,color:"#6a6a6a",marginBottom:16,lineHeight:1.5}}>By confirming you agree to the <span style={{color:ACCENT,cursor:"pointer",fontWeight:600}}>cancellation policy</span> and <span style={{color:ACCENT,cursor:"pointer",fontWeight:600}}>house rules</span>.</p>
      <button onClick={()=>setStep(3)} style={{width:"100%",background:ACCENT,color:"#fff",border:"none",borderRadius:12,padding:"15px",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"background 0.2s"}}
        onMouseEnter={e=>e.currentTarget.style.background="#e00b41"} onMouseLeave={e=>e.currentTarget.style.background=ACCENT}>
        Confirm &amp; Request to Book
      </button>
    </div>
  );

  const canReserve = selectedRoom && checkIn && checkOut && nights > 0;

  return (
    <div style={{border:"1px solid #e0e0e0",borderRadius:24,padding:28,boxShadow:"rgba(0,0,0,0.02) 0px 0px 0px 1px,rgba(0,0,0,0.06) 0px 4px 12px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:20}}>
        <div>
          <span style={{fontSize:22,fontWeight:800,color:"#222"}}>from {hostel.rooms[0].price.toLocaleString()} DA</span>
          <span style={{fontSize:14,color:"#6a6a6a"}}> / night</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:14}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="#222"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span style={{fontWeight:700}}>{hostel.rating}</span>
          <span style={{color:"#6a6a6a"}}>({hostel.reviews})</span>
        </div>
      </div>

      {/* Dates + guests */}
      <div style={{border:"1px solid #e0e0e0",borderRadius:12,overflow:"hidden",marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",borderBottom:"1px solid #e0e0e0"}}>
          <div style={{padding:"10px 14px",borderRight:"1px solid #e0e0e0"}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:0.5,color:"#222",marginBottom:4}}>CHECK-IN</div>
            <input type="date" min={today} value={checkIn} onChange={e=>setCheckIn(e.target.value)} style={{border:"none",outline:"none",fontFamily:"inherit",fontSize:13,color:"#222",background:"transparent",width:"100%",cursor:"pointer",colorScheme:"light"}}/>
          </div>
          <div style={{padding:"10px 14px"}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:0.5,color:"#222",marginBottom:4}}>CHECK-OUT</div>
            <input type="date" min={checkIn||today} value={checkOut} onChange={e=>setCheckOut(e.target.value)} style={{border:"none",outline:"none",fontFamily:"inherit",fontSize:13,color:"#222",background:"transparent",width:"100%",cursor:"pointer",colorScheme:"light"}}/>
          </div>
        </div>
        <div style={{padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:0.5,color:"#222",marginBottom:6}}>GUESTS</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setGuests(g=>Math.max(1,g-1))} style={{width:26,height:26,borderRadius:"50%",border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",color:"#222"}}>−</button>
            <span style={{fontSize:14,fontWeight:600}}>{guests} guest{guests!==1?"s":""}</span>
            <button onClick={()=>setGuests(g=>g+1)} style={{width:26,height:26,borderRadius:"50%",border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",color:"#222"}}>+</button>
          </div>
        </div>
      </div>

      {/* Room list */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#222",marginBottom:10}}>Select a room</div>
        {hostel.rooms.map(r => {
          const sel = selectedRoom === r.id;
          return (
            <div key={r.id} onClick={()=>setSelectedRoom(r.id)} style={{border:`2px solid ${sel?ACCENT:"#e0e0e0"}`,borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",background:sel?"#fff8f9":"#fff",transition:"border-color 0.15s,background 0.15s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14,color:"#222"}}>{r.name}</div>
                  <div style={{fontSize:12,color:"#6a6a6a",marginTop:2}}>Up to {r.capacity} guests · {r.available} left</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>
                    {r.perks.map(p=><span key={p} style={{fontSize:11,color:"#6a6a6a",background:"#f2f2f2",padding:"2px 8px",borderRadius:99}}>{p}</span>)}
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:15,fontWeight:800,color:"#222"}}>{r.price.toLocaleString()} DA</div>
                  <div style={{fontSize:11,color:"#6a6a6a"}}>/night</div>
                </div>
              </div>
              {sel && (
                <div style={{display:"flex",alignItems:"center",gap:4,marginTop:8,color:ACCENT,fontSize:12,fontWeight:600}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={ACCENT} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>Selected
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Price breakdown */}
      {canReserve && (
        <div className="slide-up" style={{background:"#f7f7f7",borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}><span>{room?.price.toLocaleString()} DA × {nights} night{nights!==1?"s":""}</span><span>{subtotal.toLocaleString()} DA</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}><span>Service fee</span><span>{serviceFee.toLocaleString()} DA</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:700,borderTop:"1px solid #e0e0e0",paddingTop:10}}><span>Total</span><span style={{color:ACCENT}}>{total.toLocaleString()} DA</span></div>
        </div>
      )}

      <button onClick={()=>canReserve&&setStep(2)} style={{width:"100%",background:canReserve?ACCENT:"#e0e0e0",color:canReserve?"#fff":"#999",border:"none",borderRadius:12,padding:"15px",fontSize:16,fontWeight:700,cursor:canReserve?"pointer":"not-allowed",fontFamily:"inherit",transition:"background 0.2s"}}
        onMouseEnter={e=>{if(canReserve)e.currentTarget.style.background="#e00b41";}}
        onMouseLeave={e=>{e.currentTarget.style.background=canReserve?ACCENT:"#e0e0e0";}}>
        {!selectedRoom ? "Select a room" : (!checkIn||!checkOut||nights<=0) ? "Add your dates" : "Reserve"}
      </button>
      <p style={{textAlign:"center",fontSize:12,color:"#6a6a6a",marginTop:10}}>You won't be charged yet · Free cancellation</p>

      <button onClick={()=>setLiked(l=>!l)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#222",fontFamily:"inherit",margin:"14px auto 0",padding:0}}>
        <svg width="15" height="15" viewBox="0 0 24 24" fill={liked?"#ff385c":"none"} stroke={liked?"#ff385c":"#222"} strokeWidth="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        {liked ? "Saved to wishlist" : "Save to wishlist"}
      </button>
    </div>
  );
}

            <div style={{display:"flex",gap:10}}>
              {[
                {icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#222" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>, label:"Share"},
                {icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#222" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>, label:"Save"},
              ].map(btn=>(
                <button key={btn.label} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 16px",border:"1px solid #e0e0e0",borderRadius:8,background:"#fff",cursor:"pointer",fontSize:13,fontWeight:600,color:"#222",fontFamily:"inherit",transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f7f7f7"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  {btn.icon}{btn.label}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Gallery */}
        <div style={{marginBottom:32}}><Gallery hostel={hostel}/></div>

        {/* Two-column layout */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:48,alignItems:"flex-start"}}>
          {/* LEFT */}
          <div>
            {/* Tab bar */}
            <div style={{position:"sticky",top:64,zIndex:100,background:"rgba(255,255,255,0.97)",backdropFilter:"blur(8px)",marginBottom:28,borderBottom:"1px solid #f0f0f0",marginLeft:-24,paddingLeft:24,marginRight:-24,paddingRight:24}}>
              <div style={{display:"flex",gap:0,overflowX:"auto",scrollbarWidth:"none"}}>
                {TABS.map(t=>(
                  <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"14px 16px",border:"none",background:"transparent",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:600,whiteSpace:"nowrap",color:tab===t.id?"#222":"#6a6a6a",borderBottom:tab===t.id?"2px solid #222":"2px solid transparent",transition:"color 0.15s"}}>{t.label}</button>
                ))}
              </div>
            </div>

            {/* Overview */}
            {tab==="overview" && (
              <div className="fade-in">
                <p style={{fontSize:16,lineHeight:1.78,color:"#444",marginBottom:24,textWrap:"pretty"}}>{hostel.desc}</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:32}}>
                  {hostel.highlights.map((h,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:16,border:"1px solid #f0f0f0",borderRadius:14,background:"#fafafa"}}>
                      <div style={{width:30,height:30,borderRadius:8,background:"#fff0f2",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={ACCENT} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                      </div>
                      <span style={{fontSize:14,color:"#333",fontWeight:500,lineHeight:1.45}}>{h}</span>
                    </div>
                  ))}
                </div>
                <h3 style={{fontSize:20,fontWeight:700,color:"#222",marginBottom:14,letterSpacing:"-0.3px"}}>What's included</h3>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>
                  {hostel.amenities.slice(0,8).map(a=>(
                    <div key={a.label} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 14px",background:"#f7f7f7",borderRadius:32,fontSize:13,fontWeight:500,color:"#222"}}>
                      <span>{a.icon}</span>{a.label}
                    </div>
                  ))}
                </div>
                <button onClick={()=>setTab("amenities")} style={{background:"transparent",border:"1px solid #e0e0e0",borderRadius:8,padding:"10px 20px",fontSize:14,fontWeight:600,color:"#222",cursor:"pointer",fontFamily:"inherit",marginBottom:36,transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f2f2f2"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  Show all {hostel.amenities.length} amenities
                </button>
                <h3 style={{fontSize:20,fontWeight:700,color:"#222",marginBottom:6,letterSpacing:"-0.3px"}}>Guest reviews</h3>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
                  <div style={{fontSize:52,fontWeight:800,color:"#222",letterSpacing:"-2px"}}>{hostel.rating}</div>
                  <div><StarRow rating={hostel.rating} size={18}/><div style={{fontSize:13,color:"#6a6a6a",marginTop:6}}>{hostel.reviews} reviews</div></div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
                  {hostel.reviews_list.slice(0,2).map((r,i)=>(
                    <div key={i} style={{padding:16,border:"1px solid #f0f0f0",borderRadius:14,background:"#fafafa"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                        <div style={{width:36,height:36,borderRadius:"50%",background:`hsl(${i*70+190},45%,65%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff"}}>{r.name[0]}</div>
                        <div><div style={{fontWeight:600,fontSize:13,color:"#222"}}>{r.name} {r.country}</div><div style={{fontSize:11,color:"#6a6a6a"}}>{r.date}</div></div>
                      </div>
                      <StarRow rating={r.rating} size={11}/>
                      <p style={{fontSize:13,color:"#444",lineHeight:1.55,marginTop:8,textWrap:"pretty"}}>{r.text}</p>
                    </div>
                  ))}
                </div>
                <button onClick={()=>setTab("reviews")} style={{background:"transparent",border:"1px solid #e0e0e0",borderRadius:8,padding:"10px 20px",fontSize:14,fontWeight:600,color:"#222",cursor:"pointer",fontFamily:"inherit",marginBottom:36,transition:"background 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f2f2f2"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  Show all {hostel.reviews} reviews
                </button>
                <h3 style={{fontSize:20,fontWeight:700,color:"#222",marginBottom:16,letterSpacing:"-0.3px"}}>Location</h3>
                <MapPlaceholder hostel={hostel}/>
              </div>
            )}

            {/* Rooms */}
            {tab==="rooms" && (
              <div className="fade-in">
                <h2 style={{fontSize:22,fontWeight:700,color:"#222",marginBottom:20}}>Available Rooms</h2>
                {hostel.rooms.map(r=>(
                  <div key={r.id} style={{border:"1px solid #e8e8e8",borderRadius:16,padding:22,marginBottom:16,transition:"box-shadow 0.2s"}}
                    onMouseEnter={e=>e.currentTarget.style.boxShadow="rgba(0,0,0,0.07) 0px 4px 16px"}
                    onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                    <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
                      <div style={{width:96,height:80,borderRadius:10,background:hostel.gradients[0],flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,opacity:0.75}}>{hostel.tag}</div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                          <div>
                            <h3 style={{fontSize:17,fontWeight:700,color:"#222",marginBottom:4}}>{r.name}</h3>
                            <div style={{fontSize:13,color:"#6a6a6a",marginBottom:8}}>Up to {r.capacity} guests · {r.available} remaining</div>
                            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                              {r.perks.map(p=><span key={p} style={{fontSize:12,color:"#6a6a6a",background:"#f2f2f2",padding:"3px 10px",borderRadius:99}}>{p}</span>)}
                            </div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:22,fontWeight:800,color:"#222"}}>{r.price.toLocaleString()} <span style={{fontSize:14,fontWeight:400,color:"#6a6a6a"}}>DA/night</span></div>
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:12,marginTop:16}}>
                          <button style={{background:ACCENT,color:"#fff",border:"none",borderRadius:8,padding:"10px 22px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"background 0.15s"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#e00b41"} onMouseLeave={e=>e.currentTarget.style.background=ACCENT}>
                            Book this room
                          </button>
                          <span style={{fontSize:12,color:"#22c55e",fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>Free cancellation
                          </span>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Amenities */}
            {tab==="amenities" && (
              <div className="fade-in">
                <h2 style={{fontSize:22,fontWeight:700,color:"#222",marginBottom:20}}>All Amenities</h2>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {hostel.amenities.map(a=>(
                    <div key={a.label} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",border:"1px solid #f0f0f0",borderRadius:12}}>
                      <span style={{fontSize:22}}>{a.icon}</span>
                      <span style={{fontSize:14,fontWeight:500,color:"#222"}}>{a.label}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Reviews */}
            {tab==="reviews" && (
              <div className="fade-in">
                <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:28}}>
                  <div style={{fontSize:56,fontWeight:800,color:"#222",letterSpacing:"-2px"}}>{hostel.rating}</div>
                  <div>
                    <StarRow rating={hostel.rating} size={20}/>
                    <div style={{fontSize:15,fontWeight:600,color:"#222",marginTop:6}}>Exceptional</div>
                    <div style={{fontSize:13,color:"#6a6a6a"}}>{hostel.reviews} verified reviews</div>
                  </div>
                </div>
                {hostel.reviews_list.map((r,i)=>(
                  <div key={i} style={{borderBottom:"1px solid #f0f0f0",paddingBottom:20,marginBottom:20}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                      <div style={{width:44,height:44,borderRadius:"50%",background:`hsl(${i*80+160},45%,65%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:"#fff"}}>{r.name[0]}</div>
                      <div><div style={{fontWeight:600,fontSize:15,color:"#222"}}>{r.name} {r.country}</div><div style={{fontSize:12,color:"#6a6a6a"}}>{r.date}</div></div>
                    </div>
                    <StarRow rating={r.rating} size={13}/>
                    <p style={{fontSize:15,color:"#333",lineHeight:1.65,marginTop:10,textWrap:"pretty"}}>{r.text}</p>
                  </div>
                ))}
              </div>
            )}

            {/* Location */}
            {tab==="location" && (
              <div className="fade-in">
                <h2 style={{fontSize:22,fontWeight:700,color:"#222",marginBottom:8}}>Location</h2>
                <p style={{fontSize:14,color:"#6a6a6a",marginBottom:20}}>{hostel.address}</p>
                <MapPlaceholder hostel={hostel}/>
                <div style={{marginTop:20,padding:16,background:"#f7f7f7",borderRadius:12}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#222",marginBottom:8}}>Getting there</div>
                  <div style={{fontSize:13,color:"#6a6a6a",lineHeight:1.7}}>Wilaya: {hostel.wilaya}<br/>Coordinates: {hostel.lat.toFixed(4)}°N, {Math.abs(hostel.lng).toFixed(4)}°{hostel.lng<0?"W":"E"}<br/>For detailed directions, contact the hostel directly.</div>
                </div>
              </div>
            )}

            {/* Policies */}
            {tab==="policies" && (
              <div className="fade-in">
                <h2 style={{fontSize:22,fontWeight:700,color:"#222",marginBottom:20}}>House Rules & Policies</h2>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {hostel.policies.map((p,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",border:"1px solid #f0f0f0",borderRadius:12}}>
                      <div style={{width:30,height:30,borderRadius:"50%",background:"#f7f7f7",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#222" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>
                      </div>
                      <span style={{fontSize:14,color:"#333",fontWeight:500}}>{p}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* RIGHT: booking panel */}
          <div style={{position:"sticky",top:80}}>
            <BookingPanel hostel={hostel}/>
            {/* More hostels */}
            <div style={{marginTop:20,padding:20,border:"1px solid #f0f0f0",borderRadius:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#222",marginBottom:14}}>You might also like</div>
              {others.map(h=>(
                <a key={h.id} href={`Hostel Detail.html?id=${h.id}`} style={{display:"flex",gap:10,marginBottom:12,textDecoration:"none",color:"inherit",transition:"opacity 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.opacity="0.75"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                  <div style={{width:54,height:54,borderRadius:10,background:h.gradients[0],flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,opacity:0.8}}>{h.tag}</div>
                  <div>
                    <div style={{fontWeight:600,fontSize:13,color:"#222",lineHeight:1.3}}>{h.name}</div>
                    <div style={{fontSize:12,color:"#6a6a6a",marginTop:2}}>{h.city} · {h.price.toLocaleString()} DA/night</div>
                    <div style={{display:"flex",alignItems:"center",gap:3,marginTop:3}}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="#222"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                      <span style={{fontSize:12,fontWeight:600,color:"#222"}}>{h.rating}</span>
                    </div>
                  </div>
                </a>
              ))}
              <a href="Landing Page.html" style={{display:"block",textAlign:"center",fontSize:13,fontWeight:600,color:ACCENT,textDecoration:"none",marginTop:12,padding:"9px",borderRadius:8,border:`1px solid ${ACCENT}30`,background:"#fff8f9",transition:"background 0.15s"}}
                onMouseEnter={e=>e.currentTarget.style.background="#fff0f2"} onMouseLeave={e=>e.currentTarget.style.background="#fff8f9"}>
                Browse all hostels →
              </a>
            </div>
          </div>
        </div>
      </div>

      {/* Footer */}
      <footer style={{borderTop:"1px solid #e8e8e8",padding:"28px 24px",background:"#fafafa"}}>
        <div style={{maxWidth:1280,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div style={{fontSize:13,color:"#6a6a6a"}}>© 2026 Sahil Bay Hostel · Algeria's Hostel Network</div>
          <div style={{display:"flex",gap:20}}>
            {["Privacy","Terms","Help","Contact"].map(l=>(
              <span key={l} style={{fontSize:13,color:"#6a6a6a",cursor:"pointer",transition:"color 0.15s"}}
                onMouseEnter={e=>e.currentTarget.style.color="#222"} onMouseLeave={e=>e.currentTarget.style.color="#6a6a6a"}>{l}</span>
            ))}
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">

    <rect x="0" y="0" width="120" height="12" fill="#fff" stroke="#eee" stroke-width="0.5"/>
    <rect x="4" y="3" width="16" height="6" rx="2" fill="#ff385c" opacity="0.7"/>
    <rect x="4" y="16" width="70" height="30" rx="4" fill="#c79081" opacity="0.5"/>
    <rect x="76" y="16" width="40" height="14" rx="3" fill="#e8b49a" opacity="0.4"/>
    <rect x="76" y="32" width="40" height="14" rx="3" fill="#d4956a" opacity="0.4"/>
    <rect x="4" y="50" width="68" height="8" rx="2" fill="#f0f0f0"/>
    <rect x="4" y="62" width="68" height="14" rx="4" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.5"/>
    <rect x="76" y="50" width="40" height="26" rx="4" fill="#ff385c" opacity="0.08" stroke="#ff385c" stroke-width="0.5"/>
    <rect x="80" y="62" width="32" height="8" rx="4" fill="#ff385c" opacity="0.7"/>
  </svg>
</template>
</body>
